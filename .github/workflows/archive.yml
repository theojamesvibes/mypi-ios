name: Archive

# Archive + App Store Connect upload workflow. Holds off actually running
# until the Apple Developer Program approval lands and the repo has the
# secrets below configured. `workflow_dispatch` only — deliberately not
# automatic on tag/release so a broken manifest doesn't send a silently
# half-baked build to App Store Connect.
#
# Required repository secrets (add in Settings → Secrets and variables →
# Actions before the first successful run):
#   APP_STORE_CONNECT_API_KEY_ID      — 10-char key ID from App Store Connect
#   APP_STORE_CONNECT_API_ISSUER_ID   — Issuer UUID from the same page
#   APP_STORE_CONNECT_API_KEY_P8      — contents of the .p8 file (plain text, including BEGIN/END)
#   APPLE_DEVELOPMENT_TEAM            — 10-char Apple Team ID
#   DISTRIBUTION_CERT_P12_BASE64      — base64 of the exported distribution .p12
#   DISTRIBUTION_CERT_PASSWORD        — password set when exporting the .p12
#   PROVISIONING_PROFILE_BASE64       — base64 of the App Store provisioning profile (.mobileprovision)

on:
  workflow_dispatch:
    inputs:
      upload:
        description: "Upload archive to App Store Connect (TestFlight)"
        required: true
        type: boolean
        default: true

jobs:
  archive:
    name: Archive + Upload
    runs-on: macos-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        env:
          DEVELOPMENT_TEAM: ${{ secrets.APPLE_DEVELOPMENT_TEAM }}
        run: |
          # Project.yml keeps DEVELOPMENT_TEAM empty for local simulator
          # builds — patch it in just for the archive job so the generated
          # project signs correctly.
          sed -i.bak "s/DEVELOPMENT_TEAM: \"\"/DEVELOPMENT_TEAM: \"${DEVELOPMENT_TEAM}\"/" project.yml
          xcodegen generate

      - name: Import signing certificate
        env:
          CERT_BASE64: ${{ secrets.DISTRIBUTION_CERT_P12_BASE64 }}
          CERT_PASSWORD: ${{ secrets.DISTRIBUTION_CERT_PASSWORD }}
        run: |
          KEYCHAIN=build.keychain
          KEYCHAIN_PASSWORD=$(uuidgen)
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security set-keychain-settings -lut 3600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          echo "$CERT_BASE64" | base64 --decode > cert.p12
          security import cert.p12 -k "$KEYCHAIN" -P "$CERT_PASSWORD" -T /usr/bin/codesign
          security list-keychains -d user -s "$KEYCHAIN" $(security list-keychains -d user | tr -d '"')
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          rm cert.p12

      - name: Install provisioning profile
        env:
          PROFILE_BASE64: ${{ secrets.PROVISIONING_PROFILE_BASE64 }}
        run: |
          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          echo "$PROFILE_BASE64" | base64 --decode > "$HOME/Library/MobileDevice/Provisioning Profiles/MyPi_AppStore.mobileprovision"

      - name: Build archive
        run: |
          set -o pipefail
          xcodebuild \
            -project MyPi.xcodeproj \
            -scheme MyPi \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath build/MyPi.xcarchive \
            archive

      - name: Export IPA
        run: |
          cat > ExportOptions.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>teamID</key>
            <string>${{ secrets.APPLE_DEVELOPMENT_TEAM }}</string>
            <key>uploadSymbols</key>
            <true/>
            <key>destination</key>
            <string>export</string>
          </dict>
          </plist>
          EOF
          xcodebuild \
            -exportArchive \
            -archivePath build/MyPi.xcarchive \
            -exportPath build/ipa \
            -exportOptionsPlist ExportOptions.plist \
            -allowProvisioningUpdates

      - name: Upload to App Store Connect
        if: ${{ github.event.inputs.upload == 'true' }}
        env:
          API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
          API_KEY_P8: ${{ secrets.APP_STORE_CONNECT_API_KEY_P8 }}
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          echo "$API_KEY_P8" > "$HOME/.appstoreconnect/private_keys/AuthKey_${API_KEY_ID}.p8"
          xcrun altool --upload-app \
            --type ios \
            --file build/ipa/MyPi.ipa \
            --apiKey "$API_KEY_ID" \
            --apiIssuer "$ISSUER_ID"

      - name: Upload archive artifact
        uses: actions/upload-artifact@v4
        with:
          name: MyPi-archive
          path: build/MyPi.xcarchive
          retention-days: 14
