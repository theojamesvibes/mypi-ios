name: Archive

# Archive + App Store Connect upload. Manual (workflow_dispatch) only — deliberately
# not automatic on tag/release so a broken manifest can't silently push a half-baked
# build to App Store Connect.
#
# Signing is fully MANUAL and headless: the distribution certificate (.p12) and the
# App Store provisioning profile are imported from secrets, and xcodebuild is told to
# use them explicitly (CODE_SIGN_STYLE=Manual). No Apple-account login and no profile
# fetches happen during signing — only the final upload talks to App Store Connect.
#
# Required repository secrets (Settings → Secrets and variables → Actions):
#   APP_STORE_CONNECT_API_KEY_ID      — 10-char key ID from App Store Connect
#   APP_STORE_CONNECT_API_ISSUER_ID   — Issuer UUID from the same page
#   APP_STORE_CONNECT_API_KEY_P8      — contents of the .p8 file (plain text, incl. BEGIN/END)
#   APPLE_DEVELOPMENT_TEAM            — 10-char Apple Team ID
#   DISTRIBUTION_CERT_P12_BASE64      — base64 of the exported distribution .p12
#   DISTRIBUTION_CERT_PASSWORD        — password set when exporting the .p12
#   PROVISIONING_PROFILE_BASE64       — base64 of the App Store provisioning profile (.mobileprovision)
#   PROVISIONING_PROFILE_NAME         — the profile's name EXACTLY as shown in the Apple
#                                       Developer portal (used to match it during signing)
#
# Note: CODE_SIGN_IDENTITY below is "Apple Distribution" (current cert type). If your
# distribution certificate is the older "iPhone Distribution" kind, change it to match.

on:
  workflow_dispatch:
    inputs:
      upload:
        description: "Upload archive to App Store Connect (TestFlight)"
        required: true
        type: boolean
        default: true

jobs:
  archive:
    name: Archive + Upload
    runs-on: macos-latest
    timeout-minutes: 45

    env:
      BUNDLE_ID: net.myssdomain.mypi

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 26 (iOS 26 SDK required for App Store upload)
        run: |
          # App Store Connect rejects builds made with anything older than the
          # iOS 26 SDK. The runner's default /Applications/Xcode.app symlink can
          # point at an older Xcode (16.x → iOS 18.x SDK), so select the newest
          # Xcode 26 explicitly and fail loudly if the image doesn't carry one.
          XCODE="$(ls -d /Applications/Xcode_26*.app 2>/dev/null | sort -V | tail -1)"
          if [ -z "$XCODE" ]; then
            echo "No Xcode 26 found on this runner. Installed Xcodes:"
            ls -d /Applications/Xcode*.app
            exit 1
          fi
          sudo xcode-select -s "$XCODE/Contents/Developer"
          xcodebuild -version
          xcodebuild -showsdks | grep -i iphoneos

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        env:
          DEVELOPMENT_TEAM: ${{ secrets.APPLE_DEVELOPMENT_TEAM }}
        run: |
          # project.yml keeps DEVELOPMENT_TEAM empty for local simulator builds;
          # patch it in for the archive so the generated project carries the team.
          sed -i.bak "s/DEVELOPMENT_TEAM: \"\"/DEVELOPMENT_TEAM: \"${DEVELOPMENT_TEAM}\"/" project.yml
          xcodegen generate

      - name: Import signing certificate
        env:
          CERT_BASE64: ${{ secrets.DISTRIBUTION_CERT_P12_BASE64 }}
          CERT_PASSWORD: ${{ secrets.DISTRIBUTION_CERT_PASSWORD }}
        run: |
          KEYCHAIN=build.keychain
          KEYCHAIN_PASSWORD=$(uuidgen)
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security set-keychain-settings -lut 3600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          echo "$CERT_BASE64" | base64 --decode > cert.p12
          security import cert.p12 -k "$KEYCHAIN" -P "$CERT_PASSWORD" -T /usr/bin/codesign
          security list-keychains -d user -s "$KEYCHAIN" $(security list-keychains -d user | tr -d '"')
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          rm cert.p12

      - name: Install provisioning profile
        env:
          PROFILE_BASE64: ${{ secrets.PROVISIONING_PROFILE_BASE64 }}
        run: |
          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          echo "$PROFILE_BASE64" | base64 --decode \
            > "$HOME/Library/MobileDevice/Provisioning Profiles/MyPi_AppStore.mobileprovision"

      - name: Build archive (manual signing, unique build number)
        env:
          TEAM_ID: ${{ secrets.APPLE_DEVELOPMENT_TEAM }}
          PROFILE_NAME: ${{ secrets.PROVISIONING_PROFILE_NAME }}
        run: |
          set -o pipefail
          # CFBundleVersion must be unique and strictly increasing per marketing
          # version, or App Store Connect rejects the upload. Unix epoch seconds is
          # monotonic, fits Apple's integer limit, and never collides with an
          # earlier manual "build 1".
          BUILD_NUMBER="$(date -u +%s)"
          echo "Build number: $BUILD_NUMBER"
          xcodebuild \
            -project MyPi.xcodeproj \
            -scheme MyPi \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath build/MyPi.xcarchive \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            PROVISIONING_PROFILE_SPECIFIER="$PROFILE_NAME" \
            DEVELOPMENT_TEAM="$TEAM_ID" \
            CURRENT_PROJECT_VERSION="$BUILD_NUMBER" \
            archive

      - name: Export IPA and upload to App Store Connect
        env:
          TEAM_ID: ${{ secrets.APPLE_DEVELOPMENT_TEAM }}
          PROFILE_NAME: ${{ secrets.PROVISIONING_PROFILE_NAME }}
          API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
          API_KEY_P8: ${{ secrets.APP_STORE_CONNECT_API_KEY_P8 }}
          UPLOAD: ${{ github.event.inputs.upload }}
        run: |
          set -o pipefail
          # `xcodebuild -exportArchive` with destination=upload exports AND uploads
          # to App Store Connect using the API key — the modern, first-party
          # replacement for the deprecated `altool`. With upload=false the
          # destination is `export`, producing the signed IPA locally only (a safe
          # dry run that needs no API credentials).
          if [ "$UPLOAD" = "true" ]; then DESTINATION=upload; else DESTINATION=export; fi
          echo "Export destination: $DESTINATION"

          AUTH=()
          if [ "$UPLOAD" = "true" ]; then
            mkdir -p "$HOME/.appstoreconnect/private_keys"
            KEY_PATH="$HOME/.appstoreconnect/private_keys/AuthKey_${API_KEY_ID}.p8"
            echo "$API_KEY_P8" > "$KEY_PATH"
            AUTH=(-authenticationKeyPath "$KEY_PATH" \
                  -authenticationKeyID "$API_KEY_ID" \
                  -authenticationKeyIssuerID "$ISSUER_ID")
          fi

          cat > ExportOptions.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>teamID</key>
            <string>${TEAM_ID}</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>signingCertificate</key>
            <string>Apple Distribution</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>${BUNDLE_ID}</key>
              <string>${PROFILE_NAME}</string>
            </dict>
            <key>uploadSymbols</key>
            <true/>
            <key>destination</key>
            <string>${DESTINATION}</string>
          </dict>
          </plist>
          EOF
          xcodebuild \
            -exportArchive \
            -archivePath build/MyPi.xcarchive \
            -exportPath build/ipa \
            -exportOptionsPlist ExportOptions.plist \
            "${AUTH[@]}"

      - name: Upload archive artifact
        uses: actions/upload-artifact@v4
        with:
          name: MyPi-archive
          path: build/MyPi.xcarchive
          retention-days: 14
