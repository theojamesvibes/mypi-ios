name: Build & Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build:
    name: Build for iOS Simulator
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Show build environment
        run: |
          xcodebuild -version
          xcrun --show-sdk-version --sdk iphonesimulator

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build
        run: |
          set -o pipefail
          xcodebuild \
            -project MyPi.xcodeproj \
            -scheme MyPi \
            -configuration Debug \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=YES \
            CODE_SIGNING_ALLOWED=YES \
            build

      - name: Run unit tests
        run: |
          set -o pipefail
          # Pick an available iPhone simulator on the newest installed iOS runtime,
          # so this is robust across Xcode/runtime versions on the runner image.
          DEVICE=$(xcrun simctl list devices available --json | python3 -c '
          import json, sys
          devices = json.load(sys.stdin)["devices"]
          chosen = ""
          for runtime in sorted(devices):
              if "iOS" not in runtime:
                  continue
              for dev in devices[runtime]:
                  if dev.get("isAvailable") and dev["name"].startswith("iPhone"):
                      chosen = dev["udid"]
          print(chosen)
          ')
          if [ -z "$DEVICE" ]; then echo "No iOS simulator available"; exit 1; fi
          echo "Using simulator UDID: $DEVICE"
          xcodebuild test \
            -project MyPi.xcodeproj \
            -scheme MyPi \
            -configuration Debug \
            -destination "id=$DEVICE" \
            CODE_SIGNING_ALLOWED=NO
