name: MyPi
options:
  bundleIdPrefix: net.myssdomain
  deploymentTarget:
    iOS: "18.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.10"
    MARKETING_VERSION: "0.1.9"
    CURRENT_PROJECT_VERSION: "1"
    PRODUCT_BUNDLE_IDENTIFIER: net.myssdomain.mypi
    DEVELOPMENT_TEAM: ""
    IPHONEOS_DEPLOYMENT_TARGET: "18.0"
    SWIFT_STRICT_CONCURRENCY: complete
    ENABLE_USER_SCRIPT_SANDBOXING: YES

targets:
  MyPi:
    type: application
    platform: iOS
    sources:
      - path: MyPi
    info:
      path: MyPi/Info.plist
      properties:
        CFBundleDisplayName: MyPi
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        ITSAppUsesNonExemptEncryption: false
        UILaunchScreen:
          UIColorName: "LaunchBackground"
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: true
          UISceneConfigurations: {}
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: false
    settings:
      base:
        INFOPLIST_FILE: MyPi/Info.plist
        CODE_SIGN_ENTITLEMENTS: MyPi/MyPi.entitlements

  MyPiTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: MyPiTests
    dependencies:
      - target: MyPi
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: net.myssdomain.mypiTests

schemes:
  MyPi:
    build:
      targets:
        MyPi: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - MyPiTests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
